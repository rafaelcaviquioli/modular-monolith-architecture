services:
  postgres:
    image: postgres:16-alpine
    container_name: modular-monolith-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modular_monolith
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  monolith:    
    image: monolith
    build:
      context: .
      dockerfile: src/Monolith/Dockerfile

volumes:
  postgres_data: 